services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: simauto_php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: simauto_secret_dev_2026
    command: sh -c "mkdir -p data var && chmod -R 777 data var && if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi && php-fpm"
    networks:
      - simauto_network

  nginx:
    image: nginx:alpine
    container_name: simauto_nginx
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - simauto_network

networks:
  simauto_network:
    driver: bridge
