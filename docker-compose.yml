services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: simauto_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    command: >
      sh -c "umask 0000 &&
      mkdir -p data var/cache var/log &&
      rm -rf var/cache/prod &&
      chmod -R a+rwX data var &&
      if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi &&
      php-fpm"
    networks:
      - simauto_network

  nginx:
    image: nginx:alpine
    container_name: simauto_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - simauto_network

networks:
  simauto_network:
    driver: bridge
